<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="box">
    <h2 class="google-logo">
       <span class="blue">G</span>
       <span class="red">o</span>
       <span class="yellow">o</span>
       <span class="blue">g</span>
       <span class="green">l</span>
       <span class="red">e</span>
    </h2>

    <h1>Sign In</h1>

    <p class="sub">Use Your Google Account </p>

    <input type="text" placeholder="Email or Phone">
    <p class="forgot"><a href="#">Forgot email?</a></p>

    <p class="hint">Not your Computer? Use Guest Mode To Sign In Privately</p>
    <p class="learn"><a href="#">Learn more</a></p>

    <div class="account">
       <a class="create" href="#">Create Account</a>  
       <button class="next-btn">Next</button> 
    </div>
     
  </div>
</body>
</html>
